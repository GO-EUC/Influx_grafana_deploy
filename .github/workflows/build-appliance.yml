name: Build Virtual Appliance

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: appliance-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libguestfs-tools qemu-utils passt

      - name: Build OVA appliance
        env:
          LIBGUESTFS_BACKEND: direct
          LIBGUESTFS_DEBUG: "1"
          LIBGUESTFS_TRACE: "1"
          VIRT_CUSTOMIZE_DEBUG: "true"
          VIRT_CUSTOMIZE_NO_NETWORK: "true"
          USE_SUDO_FOR_VIRT_CUSTOMIZE: "true"
        run: bash appliance/build-appliance.sh

      - name: Capture artifact paths
        id: files
        run: |
          APPLIANCE_FILE="$(ls -1 dist/*.ova | tail -n1)"
          CHECKSUM_FILE="${APPLIANCE_FILE}.sha256"
          echo "appliance_file=${APPLIANCE_FILE}" >> "${GITHUB_OUTPUT}"
          echo "checksum_file=${CHECKSUM_FILE}" >> "${GITHUB_OUTPUT}"
          echo "appliance_name=$(basename "${APPLIANCE_FILE}")" >> "${GITHUB_OUTPUT}"
          echo "checksum_name=$(basename "${CHECKSUM_FILE}")" >> "${GITHUB_OUTPUT}"

      - name: Upload build artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: appliance-ova
          path: |
            ${{ steps.files.outputs.appliance_file }}
            ${{ steps.files.outputs.checksum_file }}
            dist/virt-customize.log

      - name: Upload debug log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appliance-debug-logs
          path: |
            dist/virt-customize.log

      - name: Create GitHub Release and upload assets
        if: github.ref_name == 'main'
        id: version
        run: |
          git fetch --tags --force
          LATEST_TAG="$(
            git tag -l 'v*' \
              | awk '/^v[0-9]+\.[0-9]+$/ { print }' \
              | sort -V \
              | tail -n1
          )"

          if [ -z "${LATEST_TAG}" ]; then
            NEXT_TAG="v1.0"
          else
            VERSION_NO_V="${LATEST_TAG#v}"
            MAJOR="${VERSION_NO_V%%.*}"
            MINOR="${VERSION_NO_V##*.}"
            NEXT_TAG="v${MAJOR}.$((MINOR + 1))"
          fi

          echo "release_tag=${NEXT_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        if: github.ref_name == 'main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: ${{ steps.version.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          files: |
            ${{ steps.files.outputs.appliance_file }}
            ${{ steps.files.outputs.checksum_file }}
