name: Build Virtual Appliance

on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: appliance-build

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libguestfs-tools qemu-utils passt

      - name: Build appliance images (OVA + VHD)
        env:
          LIBGUESTFS_BACKEND: direct
          LIBGUESTFS_DEBUG: "1"
          LIBGUESTFS_TRACE: "1"
          VIRT_CUSTOMIZE_DEBUG: "true"
          VIRT_CUSTOMIZE_NO_NETWORK: "true"
          USE_SUDO_FOR_VIRT_CUSTOMIZE: "true"
        run: bash appliance/build-appliance.sh

      - name: Capture artifact paths
        id: files
        run: |
          OVA_FILE="$(ls -1 dist/*.ova | tail -n1)"
          OVA_CHECKSUM_FILE="${OVA_FILE}.sha256"
          VHD_FILE="$(ls -1 dist/*.vhd | tail -n1)"
          VHD_CHECKSUM_FILE="${VHD_FILE}.sha256"

          echo "ova_file=${OVA_FILE}" >> "${GITHUB_OUTPUT}"
          echo "ova_checksum_file=${OVA_CHECKSUM_FILE}" >> "${GITHUB_OUTPUT}"
          echo "ova_name=$(basename "${OVA_FILE}")" >> "${GITHUB_OUTPUT}"
          echo "ova_checksum_name=$(basename "${OVA_CHECKSUM_FILE}")" >> "${GITHUB_OUTPUT}"

          echo "vhd_file=${VHD_FILE}" >> "${GITHUB_OUTPUT}"
          echo "vhd_checksum_file=${VHD_CHECKSUM_FILE}" >> "${GITHUB_OUTPUT}"
          echo "vhd_name=$(basename "${VHD_FILE}")" >> "${GITHUB_OUTPUT}"
          echo "vhd_checksum_name=$(basename "${VHD_CHECKSUM_FILE}")" >> "${GITHUB_OUTPUT}"

      - name: Azure Login (OIDC)
        if: github.ref_name == 'dev'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload appliance to Azure Blob
        if: github.ref_name == 'dev'
        run: |
          az storage blob upload \
            --account-name "${{ vars.AZURE_STORAGE_ACCOUNT }}" \
            --container-name "${{ vars.AZURE_STORAGE_CONTAINER }}" \
            --name "${{ steps.files.outputs.ova_name }}" \
            --file "${{ steps.files.outputs.ova_file }}" \
            --auth-mode login \
            --overwrite true

          az storage blob upload \
            --account-name "${{ vars.AZURE_STORAGE_ACCOUNT }}" \
            --container-name "${{ vars.AZURE_STORAGE_CONTAINER }}" \
            --name "${{ steps.files.outputs.ova_checksum_name }}" \
            --file "${{ steps.files.outputs.ova_checksum_file }}" \
            --auth-mode login \
            --overwrite true

          az storage blob upload \
            --account-name "${{ vars.AZURE_STORAGE_ACCOUNT }}" \
            --container-name "${{ vars.AZURE_STORAGE_CONTAINER }}" \
            --name "${{ steps.files.outputs.vhd_name }}" \
            --file "${{ steps.files.outputs.vhd_file }}" \
            --auth-mode login \
            --overwrite true

          az storage blob upload \
            --account-name "${{ vars.AZURE_STORAGE_ACCOUNT }}" \
            --container-name "${{ vars.AZURE_STORAGE_CONTAINER }}" \
            --name "${{ steps.files.outputs.vhd_checksum_name }}" \
            --file "${{ steps.files.outputs.vhd_checksum_file }}" \
            --auth-mode login \
            --overwrite true

      - name: Print Azure Blob download URLs
        if: github.ref_name == 'dev'
        run: |
          echo "Dev appliance images uploaded:"
          echo "OVA:"
          echo "https://${{ vars.AZURE_STORAGE_ACCOUNT }}.blob.core.windows.net/${{ vars.AZURE_STORAGE_CONTAINER }}/${{ steps.files.outputs.ova_name }}"
          echo "https://${{ vars.AZURE_STORAGE_ACCOUNT }}.blob.core.windows.net/${{ vars.AZURE_STORAGE_CONTAINER }}/${{ steps.files.outputs.ova_checksum_name }}"
          echo "VHD:"
          echo "https://${{ vars.AZURE_STORAGE_ACCOUNT }}.blob.core.windows.net/${{ vars.AZURE_STORAGE_CONTAINER }}/${{ steps.files.outputs.vhd_name }}"
          echo "https://${{ vars.AZURE_STORAGE_ACCOUNT }}.blob.core.windows.net/${{ vars.AZURE_STORAGE_CONTAINER }}/${{ steps.files.outputs.vhd_checksum_name }}"

      - name: Create GitHub Release and upload assets
        if: github.ref_name == 'main'
        id: version
        run: |
          git fetch --tags --force
          LATEST_TAG="$(
            git tag -l 'v*' \
              | awk '/^v[0-9]+\.[0-9]+$/ { print }' \
              | sort -V \
              | tail -n1
          )"

          if [ -z "${LATEST_TAG}" ]; then
            NEXT_TAG="v1.0"
          else
            VERSION_NO_V="${LATEST_TAG#v}"
            MAJOR="${VERSION_NO_V%%.*}"
            MINOR="${VERSION_NO_V##*.}"
            NEXT_TAG="v${MAJOR}.$((MINOR + 1))"
          fi

          echo "release_tag=${NEXT_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        if: github.ref_name == 'main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: ${{ steps.version.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          files: |
            ${{ steps.files.outputs.ova_file }}
            ${{ steps.files.outputs.ova_checksum_file }}
            ${{ steps.files.outputs.vhd_file }}
            ${{ steps.files.outputs.vhd_checksum_file }}
